# Backing services for the integration test suite. Run from the repo root:
#   docker compose -f docker/docker-compose-test.yml up -d
#   pytest testing/ -v
#   docker compose -f docker/docker-compose-test.yml down

# No volumes on purpose: every run starts from an empty database and an empty
# Redis. The conftest creates/drops the schema per test and flushes Redis.

services:
  test-db:
    image: postgres:16
    container_name: relayix_test_db
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: test_db
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d test_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  test-redis:
    image: redis:7-alpine
    container_name: relayix_test_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
